name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Create zip
              run: zip daily-next.zip main.js styles.css manifest.json

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      styles.css

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      daily-next.zip
                      main.js
                      styles.css
                      manifest.json
